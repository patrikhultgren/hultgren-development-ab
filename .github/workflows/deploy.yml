name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to GitHub Pages
        run: |
          touch out/.nojekyll
          npx gh-pages -d out --dotfiles -u "github-actions <github-actions@users.noreply.github.com>" -r "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
